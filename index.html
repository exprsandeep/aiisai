<!DOCTYPE html>
<html>
<head>
  <title>Dino Game</title>
  <style>
    body {
      margin: 0;
      background-color: skyblue;
      overflow: hidden;
      text-align: center;
      font-family: Arial, sans-serif;
    }
    #gameCanvas {
      display: none;
      background: white;
      border-top: 4px solid black;
    }
    #playBtn, #restartBtn {
      padding: 15px 30px;
      font-size: 22px;
      margin-top: 50px;
      cursor: pointer;
    }
    #restartBtn {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Dino Jump Game</h1>
  <button id="playBtn">Play</button>
  <button id="restartBtn">Restart</button>
  <canvas id="gameCanvas"></canvas>

  <script>
    const playBtn = document.getElementById("playBtn");
    const restartBtn = document.getElementById("restartBtn");
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Pixel art stays sharp
    ctx.imageSmoothingEnabled = false;

    canvas.width = window.innerWidth;
    canvas.height = 300;

    let dino, obstacles, speed, gameOver, score;

    // Load Dino sprite
    const dinoImg = new Image();
    dinoImg.src = "dino.png";

    function init() {
      dino = { x:50, y:250, width:60, height:60, dy:0, jumping:false };
      obstacles = [];
      speed = 6;
      gameOver = false;
      score = 0;
    }

    function drawDino() {
      ctx.drawImage(dinoImg, dino.x, dino.y, dino.width, dino.height);
    }

    // ⭐ RED SPIKE OBSTACLES
    function drawObstacles() {
      ctx.fillStyle = "red";

      obstacles.forEach(o => {
        const x = Math.round(o.x);
        const y = o.y;

        ctx.beginPath();
        ctx.moveTo(x, y);                 // bottom left
        ctx.lineTo(x + o.width, y);       // bottom right
        ctx.lineTo(x + o.width/2, y - o.height); // top point
        ctx.closePath();
        ctx.fill();
      });
    }

    function drawScore() {
      ctx.fillStyle = "black";
      ctx.font = "20px Arial";
      ctx.fillText("Score: " + score, 20, 30);
    }

    function update() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drawDino();
      drawObstacles();
      drawScore();

      // gravity
      if (dino.jumping) {
        dino.y += dino.dy;
        dino.dy += 1;

        if (dino.y >= 250) {
          dino.y = 250;
          dino.jumping = false;
          dino.dy = 0;
        }
      }

      // move obstacles
      obstacles.forEach(o => o.x -= speed);

      // remove off-screen obstacles
      obstacles = obstacles.filter(o => o.x + o.width > 0);

      // collision detection
      obstacles.forEach(o => {
        if (dino.x < o.x + o.width &&
            dino.x + dino.width > o.x &&
            dino.y < o.y + o.height &&
            dino.y + dino.height > o.y) {
          gameOver = true;
        }
      });

      if (gameOver) {
        ctx.fillStyle = "red";
        ctx.font = "40px Arial";
        ctx.fillText("GAME OVER", canvas.width/2 - 100, 150);
        restartBtn.style.display = "inline-block";
        return;
      }

      score++;
      speed = Math.min(speed + 0.005, 20);

      requestAnimationFrame(update);
    }

    function spawnObstacle() {
      if (!gameOver) {

        // ⭐ Spike size
        const height = 45;
        const width = 45;

        const lastObstacle = obstacles[obstacles.length - 1];

        if (!lastObstacle || lastObstacle.x < canvas.width - (300 + speed * 20)) {
          obstacles.push({ x: canvas.width, y: 260, width: width, height: height });
        }

        const spawnRate = Math.max(800, 2000 - score);
        setTimeout(spawnObstacle, spawnRate);
      }
    }

    document.addEventListener("keydown", e => {
      if (e.code === "Space" && !dino.jumping && !gameOver) {
        dino.jumping = true;
        dino.dy = -15;
      }
    });

    playBtn.addEventListener("click", () => {
      playBtn.style.display = "none";
      canvas.style.display = "block";
      init();
      update();
      spawnObstacle();
    });

    restartBtn.addEventListener("click", () => {
      restartBtn.style.display = "none";
      init();
      update();
      spawnObstacle();
    });
  </script>
</body>
</html>
