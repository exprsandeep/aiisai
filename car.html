<!DOCTYPE html>
<html>
<head>
  <title>Endless Road</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #87CEFA; /* light blue sky */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  let roadOffset = 0;

  function drawScene() {
    const w = canvas.width;
    const h = canvas.height;

    // Sky (top half)
    const skyHeight = h * 0.4;
    ctx.fillStyle = "#87CEFA"; // light blue
    ctx.fillRect(0, 0, w, skyHeight);

    // Road (bottom part)
    const roadTop = skyHeight;
    const roadHeight = h - skyHeight;
    ctx.fillStyle = "#333"; // dark road
    ctx.fillRect(0, roadTop, w, roadHeight);

    // Lane boundaries (3 lanes)
    const laneWidth = w / 3;

    ctx.strokeStyle = "#FFFFFF";
    ctx.lineWidth = 4;

    // Left lane line
    ctx.beginPath();
    ctx.moveTo(laneWidth, roadTop);
    ctx.lineTo(laneWidth, h);
    ctx.stroke();

    // Right lane line
    ctx.beginPath();
    ctx.moveTo(2 * laneWidth, roadTop);
    ctx.lineTo(2 * laneWidth, h);
    ctx.stroke();

    // Endless dashed lane markers
    const dashLength = 40;
    const gapLength = 30;

    ctx.strokeStyle = "#FFFFAA";
    ctx.lineWidth = 6;

    for (let lane = 1; lane <= 2; lane++) {
      const x = lane * laneWidth;
      let y = roadTop + (roadOffset % (dashLength + gapLength)) - (dashLength + gapLength);

      while (y < h) {
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + dashLength);
        ctx.stroke();
        y += dashLength + gapLength;
      }
    }
  }

  function update() {
    roadOffset += 5; // speed of road movement
    drawScene();
    requestAnimationFrame(update);
  }

  update();
</script>

</body>
</html>
