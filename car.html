<!DOCTYPE html>
<html>
<head>
  <title>Car Dodging</title>
  <style>
    body {
      margin: 0;
      background: #222;
      text-align: center;
      font-family: Arial;
      color: white;
      overflow: hidden;
      height: 100vh;
      position: relative;
    }

    h1 {
      margin-top: 10px;
      font-size: 26px;
    }

    #gameCanvas {
      background: #333;
      display: none;
      margin: 0 auto;
      border: 3px solid white;
    }

    #playBtn, #restartBtn {
      padding: 18px 36px;
      font-size: 24px;
      cursor: pointer;
      margin-top: 10px;
    }

    #restartBtn {
      display: none;
    }

    #controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
    }

    #leftBtn, #rightBtn {
      padding: 20px 40px;
      font-size: 30px;
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>
<body>

  <h1>Car Dodging Game</h1>

  <button id="playBtn">Play Car Game</button>
  <button id="restartBtn">Restart</button>

  <canvas id="gameCanvas" width="400" height="450"></canvas>

  <div id="controls">
    <button id="leftBtn">⬅️</button>
    <button id="rightBtn">➡️</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const playBtn = document.getElementById("playBtn");
    const restartBtn = document.getElementById("restartBtn");
    const controls = document.getElementById("controls");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    const lanes = [60, 170, 280];

    let car = { 
      x: lanes[1], 
      y: 320, 
      width: 60, 
      height: 95,
      targetX: lanes[1]
    };

    let laneIndex = 1;
    let enemies = [];
    let speed = 3;
    let spawnRate = 1100;
    let score = 0;
    let gameOver = false;

    function drawRoad() {
      ctx.fillStyle = "#333";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = "#888";
      ctx.lineWidth = 4;

      ctx.beginPath();
      ctx.moveTo(130, 0);
      ctx.lineTo(130, 450);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(240, 0);
      ctx.lineTo(240, 450);
      ctx.stroke();
    }

    function drawCar() {
      ctx.fillStyle = "cyan";
      ctx.fillRect(car.x, car.y, car.width, car.height);
    }

    function drawEnemies() {
      ctx.fillStyle = "red";
      enemies.forEach(e => {
        ctx.fillRect(e.x, e.y, e.width, e.height);
      });
    }

    function spawnEnemy() {
      if (gameOver) return;

      const lane = Math.floor(Math.random() * 3);
      enemies.push({
        x: lanes[lane],
        y: -120,
        width: 60,
        height: 95
      });

      setTimeout(spawnEnemy, spawnRate);
    }

    function update() {
      if (gameOver) return;

      drawRoad();

      car.x += (car.targetX - car.x) * 0.35;

      drawCar();
      drawEnemies();

      enemies.forEach(e => {
        e.y += speed;
      });

      enemies = enemies.filter(e => e.y < 600);

      enemies.forEach(e => {
        if (
          Math.abs(e.x - car.x) < 40 &&
          e.y + e.height > car.y &&
          e.y < car.y + car.height
        ) {
          gameOver = true;
        }
      });

      score++;
      ctx.fillStyle = "white";
      ctx.font = "22px Arial";
      ctx.fillText("Score: " + score, 20, 30);

      if (gameOver) {
        ctx.fillStyle = "yellow";
        ctx.font = "36px Arial";
        ctx.fillText("GAME OVER", 100, 200);

        restartBtn.style.display = "inline-block";
        controls.style.display = "none";
        return;
      }

      requestAnimationFrame(update);
    }

    function moveLeft() {
      if (laneIndex > 0) {
        laneIndex--;
        car.targetX = lanes[laneIndex];
      }
    }

    function moveRight() {
      if (laneIndex < 2) {
        laneIndex++;
        car.targetX = lanes[laneIndex];
      }
    }

    leftBtn.addEventListener("click", moveLeft);
    rightBtn.addEventListener("click", moveRight);

    /* KEYBOARD CONTROLS */
    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft" || e.key === "a" || e.key === "A") {
        moveLeft();
      }
      if (e.key === "ArrowRight" || e.key === "d" || e.key === "D") {
        moveRight();
      }
    });

    function startGame() {
      playBtn.style.display = "none";
      restartBtn.style.display = "none";
      controls.style.display = "block";
      canvas.style.display = "block";

      enemies = [];
      score = 0;
      speed = 3;
      spawnRate = 1100;
      gameOver = false;
      laneIndex = 1;
      car.x = lanes[1];
      car.targetX = lanes[1];

      update();
      spawnEnemy();
    }

    playBtn.addEventListener("click", startGame);
    restartBtn.addEventListener("click", startGame);
  </script>

</body>
</html>
