<!DOCTYPE html>
<html>
<head>
  <title>Motorway POV</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #87CEFA; /* sky */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  let roadOffset = 0;

    const w = canvas.width;
    const h = canvas.height;

    // Sky
    ctx.fillStyle = "#87CEFA";
    ctx.fillRect(0, 0, w, h);

    // Horizon
    const horizonY = h * 0.45;

    // Road perspective points
    const roadBottomLeft = w * 0.15;
    const roadBottomRight = w * 0.85;
    const roadTopLeft = w * 0.40;
    const roadTopRight = w * 0.60;

    ctx.fillStyle = "#333";
    ctx.beginPath();
    ctx.moveTo(roadBottomLeft, h);
    ctx.lineTo(roadBottomRight, h);
    ctx.lineTo(roadTopRight, horizonY);
    ctx.lineTo(roadTopLeft, horizonY);
