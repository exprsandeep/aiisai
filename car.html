<!DOCTYPE html>
<html>
<head>
  <title>Motorway POV</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #777; /* grey ground */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  let roadOffset = 0;

  function cloud(x, y, s) {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(x, y, 25*s, 0, Math.PI*2);
    ctx.arc(x+30*s, y+10*s, 30*s, 0, Math.PI*2);
    ctx.arc(x-30*s, y+10*s, 20*s, 0, Math.PI*2);
    ctx.arc(x+10*s, y-10*s, 22*s, 0, Math.PI*2);
    ctx.fill();
  }

  function drawScene() {
    const w = canvas.width;
    const h = canvas.height;

    /* SUPER LONG ROAD */
    const roadBottomLeft = w * 0.06;
    const roadBottomRight = w * 0.94;

    /* Narrow top for strong perspective */
    const roadTopLeft = w * 0.49;
    const roadTopRight = w * 0.51;

    /* EXTREMELY LONG road (3× screen height) */
    const roadTopY = -h * 3;

    ctx.fillStyle = "#333";
    ctx.beginPath();
    ctx.moveTo(roadBottomLeft, h);
    ctx.lineTo(roadBottomRight, h);
    ctx.lineTo(roadTopRight, roadTopY);
    ctx.lineTo(roadTopLeft, roadTopY);
    ctx.closePath();
    ctx.fill();

    /* Lane lines */
    const laneCount = 3;
    const laneSpacingBottom = (roadBottomRight - roadBottomLeft) / laneCount;
    const laneSpacingTop = (roadTopRight - roadTopLeft) / laneCount;

    ctx.strokeStyle = "#FFFFFF";
    ctx.lineWidth = 4;

    for (let i = 1; i < laneCount; i++) {
      const bottomX = roadBottomLeft + laneSpacingBottom * i;
      const topX = roadTopLeft + laneSpacingTop * i;

      ctx.beginPath();
      ctx.moveTo(bottomX, h);
      ctx.lineTo(topX, roadTopY);
      ctx.stroke();
    }

    /* Moving dashed lane markers */
    ctx.strokeStyle = "#FFFFAA";
    ctx.lineWidth = 6;

    const dashLength = 50;
    const gapLength = 70;

    for (let i = 1; i < laneCount; i++) {
      const bottomX = roadBottomLeft + laneSpacingBottom * i;
      const topX = roadTopLeft + laneSpacingTop * i;

      let y = h - ((roadOffset % (dashLength + gapLength)));

      while (y > roadTopY) {
        const t = (y - roadTopY) / (h - roadTopY);
        const x = topX + (bottomX - topX) * t;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y - dashLength);
        ctx.stroke();

        y -= dashLength + gapLength;
      }
    }

    /* SMALLER SKY (covers less of the road) */
    const skyHeight = h * 0.18;
    ctx.fillStyle = "#87CEFA";
    ctx.fillRect(0, 0, w, skyHeight);

    /* Clouds overlapping road */
    cloud(w*0.25, skyHeight*0.7, 1.3);
    cloud(w*0.55, skyHeight*0.5, 1.1);
    cloud(w*0.80, skyHeight*0.75, 1.4);
  }

  function update() {
    roadOffset += 16; // faster forward movement
    drawScene();
    requestAnimationFrame(update);
  }

  update();
</script>

</body>
</html>
