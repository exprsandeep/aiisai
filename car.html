<!DOCTYPE html>
<html>
<head>
  <title>Motorway POV</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #87CEFA; /* sky */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  let roadOffset = 0;

  function drawScene() {
    const w = canvas.width;
    const h = canvas.height;

    // Sky
    ctx.fillStyle = "#87CEFA";
    ctx.fillRect(0, 0, w, h);

    // Horizon
    const horizonY = h * 0.45;

    // Road perspective points
    const roadBottomLeft = w * 0.15;
    const roadBottomRight = w * 0.85;
    const roadTopLeft = w * 0.40;
    const roadTopRight = w * 0.60;

    // Road shape
    ctx.fillStyle = "#333";
    ctx.beginPath();
    ctx.moveTo(roadBottomLeft, h);
    ctx.lineTo(roadBottomRight, h);
    ctx.lineTo(roadTopRight, horizonY);
    ctx.lineTo(roadTopLeft, horizonY);
    ctx.closePath();
    ctx.fill();

    // Lane lines (perspective)
    const laneCount = 3;
    const laneSpacingBottom = (roadBottomRight - roadBottomLeft) / laneCount;
    const laneSpacingTop = (roadTopRight - roadTopLeft) / laneCount;

    ctx.strokeStyle = "#FFF";
    ctx.lineWidth = 4;

    for (let i = 1; i < laneCount; i++) {
      const bottomX = roadBottomLeft + laneSpacingBottom * i;
      const topX = roadTopLeft + laneSpacingTop * i;

      ctx.beginPath();
      ctx.moveTo(bottomX, h);
      ctx.lineTo(topX, horizonY);
      ctx.stroke();
    }

    // Moving dashed lane markers
    ctx.strokeStyle = "#FFFFAA";
    ctx.lineWidth = 6;

    const dashLength = 40;
    const gapLength = 60;

    for (let i = 1; i < laneCount; i++) {
      const bottomX = roadBottomLeft + laneSpacingBottom * i;
      const topX = roadTopLeft + laneSpacingTop * i;

      let y = h - ((roadOffset % (dashLength + gapLength)));

      while (y > horizonY) {
        // Interpolate X position based on Y
        const t = (y - horizonY) / (h - horizonY);
        const x = topX + (bottomX - topX) * t;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y - dashLength);
        ctx.stroke();

        y -= dashLength + gapLength;
      }
    }
  }

  function update() {
    roadOffset += 10; // speed of road movement
    drawScene();
    requestAnimationFrame(update);
  }

  update();
</script>

</body>
</html>
