<!DOCTYPE html>
<html>
<head>
  <title>Car Dodging</title>
  <style>
    body {
      margin: 0;
      background: #222;
      text-align: center;
      font-family: Arial;
      color: white;
      overflow: hidden; /* No scrolling */
      height: 100vh;
      position: relative;
    }

    h1 {
      margin-top: 10px;
      font-size: 26px;
    }

    #gameCanvas {
      background: #444;
      display: none;
      margin: 0 auto;
      border: 3px solid white;
    }

    #playBtn {
      padding: 18px 36px;
      font-size: 24px;
      cursor: pointer;
      margin-top: 10px;
    }

    #controls {
      position: absolute;
      bottom: 10px;        /* Buttons always visible */
      left: 50%;
      transform: translateX(-50%);
      display: none;
    }

    #leftBtn, #rightBtn {
      padding: 20px 40px;
      font-size: 30px;
      cursor: pointer;
      margin: 10px;
    }
  </style>
</head>
<body>

  <h1>Car Dodging Game</h1>

  <button id="playBtn">Play Car Game</button>

  <!-- Canvas -->
  <canvas id="gameCanvas" width="400" height="450"></canvas>

  <!-- Buttons ALWAYS visible at bottom -->
  <div id="controls">
    <button id="leftBtn">⬅️</button>
    <button id="rightBtn">➡️</button>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const playBtn = document.getElementById("playBtn");
    const controls = document.getElementById("controls");
    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");

    // Lane positions
    const lanes = [60, 170, 280];

    // Car settings
    let car = { x: lanes[1], y: 320, width: 70, height: 110 };
    let laneIndex = 1;

    let enemies = [];
    let speed = 5;
    let score = 0;
    let gameOver = false;

    function drawCar() {
      ctx.fillStyle = "cyan";
      ctx.fillRect(car.x, car.y, car.width, car.height);
    }

    function drawEnemies() {
      ctx.fillStyle = "red";
      enemies.forEach(e => {
        ctx.fillRect(e.x, e.y, e.width, e.height);
      });
    }

    function spawnEnemy() {
      if (gameOver) return;

      const lane = Math.floor(Math.random() * 3);
      enemies.push({
        x: lanes[lane],
        y: -120,
        width: 70,
        height: 110
      });

      setTimeout(spawnEnemy, 800);
    }

    function update() {
      if (gameOver) return;

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawCar();
      drawEnemies();

      enemies.forEach(e => {
        e.y += speed;
      });

      enemies = enemies.filter(e => e.y < 600);

      enemies.forEach(e => {
        if (
          e.x === car.x &&
          e.y + e.height > car.y &&
          e.y < car.y + car.height
        ) {
          gameOver = true;
        }
      });

      score++;
      ctx.fillStyle = "white";
      ctx.font = "22px Arial";
      ctx.fillText("Score: " + score, 20, 30);

      if (gameOver) {
        ctx.fillStyle = "yellow";
        ctx.font = "36px Arial";
        ctx.fillText("GAME OVER", 100, 200);
        return;
      }

      requestAnimationFrame(update);
    }

    function moveLeft() {
      if (laneIndex > 0) {
        laneIndex--;
        car.x = lanes[laneIndex];
      }
    }

    function moveRight() {
      if (laneIndex < 2) {
        laneIndex++;
        car.x = lanes[laneIndex];
      }
    }

    leftBtn.addEventListener("click", moveLeft);
    rightBtn.addEventListener("click", moveRight);

    playBtn.addEventListener("click", () => {
      playBtn.style.display = "none";
      controls.style.display = "block";
      canvas.style.display = "block";

      enemies = [];
      score = 0;
      speed = 5;
      gameOver = false;
      laneIndex = 1;
      car.x = lanes[1];

      update();
      spawnEnemy();
    });
  </script>

</body>
</html>
