<!DOCTYPE html>
<html>
<head>
  <title>Motorway POV</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #777; /* grey ground */
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener("resize", resizeCanvas);

  let roadOffset = 0;

  function drawCloud(x, y, scale) {
    ctx.fillStyle = "white";
    ctx.beginPath();
    ctx.arc(x, y, 25 * scale, 0, Math.PI * 2);
    ctx.arc(x + 30 * scale, y + 10 * scale, 30 * scale, 0, Math.PI * 2);
    ctx.arc(x - 30 * scale, y + 10 * scale, 20 * scale, 0, Math.PI * 2);
    ctx.arc(x + 10 * scale, y - 10 * scale, 22 * scale, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawMountains() {
    const w = canvas.width;
    const h = canvas.height;

    ctx.fillStyle = "#556B2F"; // dark green mountains

    ctx.beginPath();
    ctx.moveTo(0, h * 0.35);
    ctx.lineTo(w * 0.15, h * 0.20);
    ctx.lineTo(w * 0.30, h * 0.35);
    ctx.closePath();
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(w, h * 0.35);
    ctx.lineTo(w * 0.85, h * 0.20);
    ctx.lineTo(w * 0.70, h * 0.35);
    ctx.closePath();
    ctx.fill();
  }

  function drawBuildings() {
    const w = canvas.width;
    const h = canvas.height;

    ctx.fillStyle = "#444";

    // Left buildings
    ctx.fillRect(w * 0.02, h * 0.30, 60, 200);
    ctx.fillRect(w * 0.10, h * 0.25, 50, 250);

    // Right buildings
    ctx.fillRect(w * 0.88, h * 0.30, 60, 200);
    ctx.fillRect(w * 0.78, h * 0.25, 50, 250);
  }

  function drawScene() {
    const w = canvas.width;
    const h = canvas.height;

    // ROAD FIRST
    const roadBottomLeft = w * 0.10;
    const roadBottomRight = w * 0.90;

    const roadTopLeft = w * 0.45;
    const roadTopRight = w * 0.55;
    const roadTopY = -h * 1.5;

    ctx.fillStyle = "#333";
    ctx.beginPath();
    ctx.moveTo(roadBottomLeft, h);
    ctx.lineTo(roadBottomRight, h);
    ctx.lineTo(roadTopRight, roadTopY);
    ctx.lineTo(roadTopLeft, roadTopY);
    ctx.closePath();
    ctx.fill();

    // Lane lines
    const laneCount = 3;
    const laneSpacingBottom = (roadBottomRight - roadBottomLeft) / laneCount;
    const laneSpacingTop = (roadTopRight - roadTopLeft) / laneCount;

    ctx.strokeStyle = "#FFFFFF";
    ctx.lineWidth = 4;

    for (let i = 1; i < laneCount; i++) {
      const bottomX = roadBottomLeft + laneSpacingBottom * i;
      const topX = roadTopLeft + laneSpacingTop * i;

      ctx.beginPath();
      ctx.moveTo(bottomX, h);
      ctx.lineTo(topX, roadTopY);
      ctx.stroke();
    }

    // Moving dashed lane markers
    ctx.strokeStyle = "#FFFFAA";
    ctx.lineWidth = 6;

    const dashLength = 50;
    const gapLength = 70;

    for (let i = 1; i < laneCount; i++) {
      const bottomX = roadBottomLeft + laneSpacingBottom * i;
      const topX = roadTopLeft + laneSpacingTop * i;

      let y = h - ((roadOffset % (dashLength + gapLength)));

      while (y > roadTopY) {
        const t = (y - roadTopY) / (h - roadTopY);
        const x = topX + (bottomX - topX) * t;

        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y - dashLength);
        ctx.stroke();

        y -= dashLength + gapLength;
      }
    }

    // SKY OVER ROAD
    const skyHeight = h * 0.30;
    ctx.fillStyle = "#87CEFA";
    ctx.fillRect(0, 0, w, skyHeight);

    // CLOUDS OVER ROAD
    drawCloud(w * 0.25, skyHeight * 0.7, 1.3);
    drawCloud(w * 0.55, skyHeight * 0.5, 1.1);
    drawCloud(w * 0.80, skyHeight * 0.75, 1.4);

    // SIDE SCENERY (choose one)
    drawMountains();  // countryside
    // drawBuildings(); // city
  }

  function update() {
    roadOffset += 12;
    drawScene();
    requestAnimationFrame(update);
  }

  update();
</script>

</body>
</html>
